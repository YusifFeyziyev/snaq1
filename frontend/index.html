<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Futbol Analiz Sistemi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">⚽ Futbol Analiz</div>
    <div class="subtitle">AI-Powered Match Analysis System</div>
  </header>

  <section class="input-section">
    <textarea id="statsInput" placeholder="SoccerStats mətnini bura yapışdırın..."></textarea>
    <div class="button-group">
        <button id="analyzeBtn" onclick="startAnalysis()">
          <span id="btnText">Analizi Başlat</span>
          <span id="btnSpinner" class="spinner hidden"></span>
        </button>
        <button id="resetBtn" onclick="location.reload()" class="btn-secondary">Təmizlə</button>
    </div>
  </section>

  <div id="errorBox" class="error-box hidden"></div>

  <div id="resultPanel" class="hidden">
    
    <section class="top-section">
      <h2>🏆 Top Tövsiyələr</h2>
      <div id="topPicks" class="top-picks">
        </div>
    </section>

    <section class="final-section" id="finalSection">
      <h2>⚖️ M4 Final Qərar</h2>
      <div class="final-grid">
        <div class="final-row">
          <span>Sistem Güvəni</span>
          <div class="conf-bar-wrap"><div class="conf-bar-fill" id="fillSistem"></div></div>
          <span id="lblSistem">0%</span>
        </div>
        <div class="final-row">
          <span>Qərar Güvəni</span>
          <div class="conf-bar-wrap"><div class="conf-bar-fill" id="fillQerar"></div></div>
          <span id="lblQerar">0%</span>
        </div>
      </div>
      <div class="final-verdict" id="finalVerdict"></div>
      <div class="final-reason" id="finalReason"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
